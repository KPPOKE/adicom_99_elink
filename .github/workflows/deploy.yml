name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/adicom99_ci
      AUTH_SECRET: ci-auth-secret-change-me-at-least-32-characters
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: adicom99_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Audit dependencies
        run: npm audit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Apply CI database migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to aaPanel VPS
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.SERVER_PROJECT_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            npm ci --include=dev
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 restart adicom99
            pm2 save
