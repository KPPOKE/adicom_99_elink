name: Deploy to aaPanel Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }} # Biasanya 22
          script: |
            # Pindah ke direktori project di aaPanel
            cd /www/wwwroot/${{ secrets.DOMAIN_NAME }}
            
            # Tarik kode terbaru dari GitHub
            git pull origin main
            
            # Install dependensi
            npm install
            
            # Generate Prisma Client & Run Migrations
            npx prisma generate
            npx prisma migrate deploy
            
            # Build project Next.js
            npm run build
            
            # Restart aplikasi menggunakan PM2 (Sesuaikan nama PM2 dengan yang Anda buat di aaPanel)
            pm2 restart adicom99
